version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forgeflow
      POSTGRES_PASSWORD: forgeflow_dev
      POSTGRES_DB: forgeflow_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
